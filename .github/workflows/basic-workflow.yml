name: Advanced Workflow


env:
  WORKFLOW_VAR: "This Variable is declared at at the workflow level"

# triggers for the workflow, branches to apply workflow
# e.g., on: [push, pull_request, workflow_dispatch, scheduled, fork, issue]
on:
  workflow_dispatch:

# runner to execute commands, run workflow jobs (github hosted or self hosted)
# actions: prebuilt commands that can be used in the workflow (checkout runtime, publish artifacts)
jobs:
  first_job:
    # define runner with 'runs-on'
    runs-on: ubuntu-latest
    env:
      JOB_VAR: "This Variable is declared at the job level"
    steps:
      - name:  First Job Script
        shell: bash
        run:   echo Hello World!  This is the first Job.
      # checkout from target branch
      - name: Checkout Action
        uses: actions/checkout@v4
      # from javascript hello world action
      - name: Print to Log
        id: print-to-log
        uses: actions/hello-world-javascript-action@main
        with:
          who-to-greet: ${{ github.actor }}
      - name: time
        run: |
            echo "The time of the greeting was ${{ steps.print-to-log.outputs.time }}"

  second_job:
    # define runner with 'runs-on'
    runs-on: ubuntu-latest
    needs:   first_job
    steps:
      - name:  Second Job Script
        shell: bash
        run:   |
          echo This is the Second Job Script
          echo This is a Multi-line Script
      - name:  Environment Variables
        env:
          STEP_VAR: "This Variable is declared at the step level"
        run:   |
          echo "This is the WORKFLOW_VAR:   $WORKFLOW_VAR"
          echo "This is the JOB_VAR:        $JOB_VAR"
          echo "This is the STEP_VAR:       $STEP_VAR"
          echo "This is the GITHUB_ACTOR:   $GITHUB_ACTOR $GITHUB_JOB $GITHUB_REF $GITHUB_RUN_ID"
