name: Python Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python_ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        # install specific version of uv and enable caching for faster installs in future runs
        with:
          version:      "0.11.3"
          enable-cache: true

      - name: Install Python and Dependencies
        run: make install_python
