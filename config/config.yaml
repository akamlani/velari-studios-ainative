defaults:
  - _self_

app:
  name: velari-github-workflows
  version: "0.1.0"
  debug: false

data:
  raw_dir: data/raw
  processed_dir: data/processed
  output_dir: data/output

training:
  seed: 42
  epochs: 10
  batch_size: 32
  learning_rate: 1e-3

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
