# Application configuration defaults
app:
  name: velari-github-workflows
  version: "0.1.0"
  env: development
  debug: false

# Logging configuration
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    - console

# Data paths
paths:
  data_dir: data
  output_dir: outputs
  cache_dir: .cache

# Model / experiment defaults
experiment:
  seed: 42
  batch_size: 32
  max_epochs: 10
  learning_rate: 1e-3

# Hydra output settings (overrides can be set at runtime)
hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
